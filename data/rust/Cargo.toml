[workspace]
members = ["morloc-runtime", "morloc-nexus", "morloc-manager"]
resolver = "2"

[workspace.dependencies]
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"
twox-hash = "2"
nix = { version = "0.29", features = ["signal", "socket", "mman", "process", "fs"] }
clap = { version = "4", features = ["derive"] }
thiserror = "2"

[profile.release]
opt-level = 2
lto = "thin"
