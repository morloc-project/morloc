# C language metadata for morloc compiler
name: c
extension: c
aliases: []
is_compiled: true
run_command: []
serial_type: ""
cost: 1
# C strings are NUL-terminated; interior NUL bytes are rejected at the boundary.
allow_string_null: false
# A sourced symbol is a C identifier or operator, emitted verbatim.
ldNamePattern: "[A-Za-z_][A-Za-z0-9_]*"
ldOperatorPattern: "[-!%&*+./<=>^|$~@:?]+"
