name: Test Morloc
on: [push]

jobs:
  linux-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ghcr.io/morloc-project/morloc/morloc-test:latest
      options: --shm-size=4g # required for shared memory pool

    env:
      HOME: /root
      DEBIAN_FRONTEND: noninteractive
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Morloc code
        uses: actions/checkout@v4

      - name: Add morloc bin folders to PATH
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/morloc/bin" >> $GITHUB_PATH

      - name: Diagnostics
        run: |
          pwd
          ls -l
          whoami

      - name: Build Morloc
        run: |
          stack --allow-different-user install --no-run-tests --local-bin-path=/usr/local/bin

      - name: Load morloc modules
        run: |
          morloc init -f
          morloc install internal root root-r root-py root-cpp bits bits-cpp bits-py char char-cpp char-py char-r map map-cpp map-py map-r math math-cpp math-py math-r random random-cpp random-py random-r set set-cpp set-py set-r shell shell-cpp shell-py text text-cpp text-py maybe maybe-r maybe-py maybe-cpp

      - name: Test morloc
        run: |
          stack test morloc:morloc-test
        timeout-minutes: 10
