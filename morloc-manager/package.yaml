name:             morloc-manager
version:          0.11.0
homepage:         https://github.com/morloc-project/morloc
synopsis:         Container lifecycle manager for Morloc
description: |
  morloc-manager orchestrates containerized Morloc environments: installing
  specific Morloc versions, managing dependency layers via Dockerfiles,
  running commands inside containers, and supporting a build/freeze/serve
  lifecycle for deploying Morloc programs as immutable services.
category:         Development, Deployment
license:          Apache-2.0
license-file:     ../LICENSE
author:           "Zebulun Arendsee"
maintainer:       "z@morloc.io"
github:           "morloc-project/morloc"
copyright:        "2026 Zebulun Arendsee"

default-extensions:
  - DeriveGeneric
  - OverloadedStrings

dependencies:
  - base >= 4.7 && < 5
  - aeson
  - bytestring
  - containers
  - cryptohash-sha256
  - directory
  - filepath
  - optparse-applicative
  - process
  - text
  - time
  - unix

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wredundant-constraints
  - -haddock

executables:
  morloc-manager:
    main:          Main.hs
    source-dirs:   app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
      - -O2
    dependencies:
      - morloc-manager

library:
  source-dirs: src

tests:
  morloc-manager-test:
    main:          Spec.hs
    source-dirs:   test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - morloc-manager
      - tasty
      - tasty-hunit
      - tasty-quickcheck
      - QuickCheck
      - temporary
